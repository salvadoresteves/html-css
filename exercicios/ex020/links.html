<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
 
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
 
        a:visited{
            color:darkred;
        }
 
        a:hover{
            color: black;
            text-decoration: underline;
        }
 
        a:active{
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Personalizando links!</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io"target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/Cursoemvideo"target="_blank">Canal de Youtube</a></li>
        <li><a href="hhtps://www.cursoemvideo.com"target="_blank">Site do CursoEmVideo</a></li>
 
    </ul>
</body>
</html>
